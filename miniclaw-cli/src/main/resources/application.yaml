# miniclaw default configuration
# API Key 优先级: 环境变量 MINICLAW_API_KEY > 本文件 apiKey > 交互式输入

# apiKey: "sk-ant-..."   # 留空则从环境变量或交互式输入获取

# 工作目录限制（留空=启动时所在目录）
# root: "/home/user/projects"

# Agent 配置
agent:
  maxIterations: 20
  model: "claude-sonnet-4-6"

# 日志
logging:
  level: "${MINICLAW_LOG_LEVEL:-INFO}"
