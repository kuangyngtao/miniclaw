name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Validate tag and project version
        shell: pwsh
        run: |
          $version = (mvn -q -DforceStdout -Dstyle.color=never help:evaluate -Dexpression=project.version | Select-Object -Last 1).Trim()
          if ($version -match 'SNAPSHOT$') { throw "Release version must not be a SNAPSHOT: $version" }
          if ("v$version" -ne "${{ github.ref_name }}") { throw "Tag must be v$version" }
          "VERSION=$version" >> $env:GITHUB_ENV
      - name: Clean verify and package
        run: mvn -B -ntp clean verify
      - name: Stage and smoke release artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $jarName = "clawkit-$env:VERSION.jar"
          $zipName = "clawkit-$env:VERSION-windows.zip"
          $windowsDir = "dist/clawkit-$env:VERSION-windows"

          Copy-Item "clawkit-cli/target/clawkit-cli-$env:VERSION.jar" "dist/$jarName"
          New-Item -ItemType Directory -Force $windowsDir | Out-Null
          Copy-Item "dist/$jarName" "$windowsDir/clawkit.jar"
          Copy-Item "clawkit.cmd" "$windowsDir/clawkit.cmd"
          Copy-Item "README.md" "$windowsDir/README.md"

          java -jar "dist/$jarName" --help
          $jarVersion = java -jar "dist/$jarName" --version
          if ($jarVersion -ne "clawkit $env:VERSION") { throw "Unexpected JAR version: $jarVersion" }
          $windowsVersion = & "$windowsDir/clawkit.cmd" --version
          if ($windowsVersion -ne "clawkit $env:VERSION") { throw "Unexpected Windows package version: $windowsVersion" }

          Compress-Archive -Path "$windowsDir/*" -DestinationPath "dist/$zipName"
          @(
            (Get-FileHash "dist/$jarName" -Algorithm SHA256).Hash.ToLower() + "  $jarName"
            (Get-FileHash "dist/$zipName" -Algorithm SHA256).Hash.ToLower() + "  $zipName"
          ) | Set-Content "dist/SHA256SUMS.txt"
      - name: Publish release after all checks pass
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --draft --verify-tag --title "clawkit $env:VERSION"
          gh release upload "${{ github.ref_name }}" `
            "dist/clawkit-$env:VERSION.jar" `
            "dist/clawkit-$env:VERSION-windows.zip" `
            "dist/SHA256SUMS.txt"
          gh release edit "${{ github.ref_name }}" --draft=false
