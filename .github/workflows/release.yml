name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Validate tag and project version
        shell: pwsh
        run: |
          $version = (mvn -q -DforceStdout -Dstyle.color=never help:evaluate -Dexpression=project.version | Select-Object -Last 1).Trim()
          if ($version -match 'SNAPSHOT$') { throw "Release version must not be a SNAPSHOT: $version" }
          if ("v$version" -ne "${{ github.ref_name }}") { throw "Tag must be v$version" }
          "VERSION=$version" >> $env:GITHUB_ENV
      - name: Clean verify and package
        run: mvn -B -ntp clean verify
      - name: Stage and smoke release artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "clawkit-cli/target/clawkit-cli-$env:VERSION.jar" "dist/clawkit-$env:VERSION.jar"
          java -jar "dist/clawkit-$env:VERSION.jar" --help
          $actual = java -jar "dist/clawkit-$env:VERSION.jar" --version
          if ($actual -ne "clawkit $env:VERSION") { throw "Unexpected version: $actual" }
          (Get-FileHash "dist/clawkit-$env:VERSION.jar" -Algorithm SHA256).Hash.ToLower() + "  clawkit-$env:VERSION.jar" |
            Set-Content "dist/clawkit-$env:VERSION.jar.sha256"
      - name: Publish release after all checks pass
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --draft --verify-tag --title "clawkit $env:VERSION"
          gh release upload "${{ github.ref_name }}" "dist/clawkit-$env:VERSION.jar" "dist/clawkit-$env:VERSION.jar.sha256"
          gh release edit "${{ github.ref_name }}" --draft=false
