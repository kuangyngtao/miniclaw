name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Check committed whitespace
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          } elseif ("${{ github.event.before }}" -and "${{ github.event.before }}" -notmatch '^0+$') {
            git diff --check "${{ github.event.before }}...${{ github.sha }}"
          } else {
            git show --check --oneline "${{ github.sha }}"
          }
      - name: Clean verify
        run: mvn -B -ntp clean verify
      - name: Ensure build did not modify tracked files
        run: git diff --check

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: docker build -t clawkit:ci .
      - run: docker run --rm clawkit:ci --help
      - run: docker run --rm clawkit:ci --version
      - run: test "$(docker run --rm --entrypoint id clawkit:ci -u)" != "0"
